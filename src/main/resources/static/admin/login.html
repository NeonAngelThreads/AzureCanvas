<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录 - MUST星河论坛</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../css/color_scheme/colors.dark_mode.css">
    <link rel="stylesheet" href="../css/color_scheme/colors.primary.css">
    <link rel="stylesheet" href="../css/app.major.css">
    <link rel="stylesheet" href="../css/attributes.texts.css">
    <link rel="stylesheet" href="../css/botpage/page.adminlogin.major.css">
</head>

<body class="light-mode">
    <div class="login-container">
        <div class="logo">
            <h1><i class="fas fa-crown"></i> 管理员登录</h1>
        </div>

        <form class="login-form" id="loginForm">
            <div class="form-group">
                <label class="form-label" for="username">用户名</label>
                <input type="text" class="form-input" id="username" name="username" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">密码</label>
                <input type="password" class="form-input" id="password" name="password" required>
            </div>

            <button type="submit" class="login-btn">登录</button>

            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>
        </form>

        <div class="back-link">
            <a href="../index.html"><i class="fas fa-arrow-left"></i> 返回首页</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');

            // 清空消息
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                if (response.ok) {
                    const data = await response.json();
                    // 存储token
                    localStorage.setItem('token', data.token);
                    // 检查是否为管理员
                    if (data.user.role === 'admin') {
                        successMessage.textContent = '登录成功，正在跳转...';
                        successMessage.style.display = 'block';
                        // 跳转到机器人管理页面
                        setTimeout(() => {
                            window.location.href = 'robots.html';
                        }, 1000);
                    } else {
                        errorMessage.textContent = '您不是管理员，无权访问';
                        errorMessage.style.display = 'block';
                    }
                } else {
                    const error = await response.text();
                    errorMessage.textContent = '登录失败：' + error;
                    errorMessage.style.display = 'block';
                }
            } catch (error) {
                console.error('登录失败:', error);
                errorMessage.textContent = '登录失败，请稍后重试';
                errorMessage.style.display = 'block';
            }
        });
    </script>
</body>

</html>
